<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bize Ulaşın | Sivas Kaşifi</title>
    <link rel="icon" href="images/logo2.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fw-bold" href="./index.html">
                <img src="images/logo2.png" alt="Sivas Kaşifi Logo" width="40" height="40"
                    class="d-inline-block align-top me-2">
                <span>SİVAS KAŞİFİ</span>
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fw-bold align-items-center">
                    <li class="nav-item"><a class="nav-link" href="./index.html">Anasayfa</a></li>
                    <li class="nav-item"><a class="nav-link" href="./rehber.html">Rehber</a></li>
                    <li class="nav-item"><a class="nav-link active" href="./iletisim.html">İletişim</a></li>
                    <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
                        <button id="themeToggleBtn" class="btn btn-sm btn-outline-light rounded-circle" title="Gece/Gündüz Modu" style="width: 36px; height: 36px; display:flex; align-items:center; justify-content:center; font-size:16px;">🌙</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="contact-section flex-grow-1 d-flex align-items-center">
        <div class="container py-5">
            <div class="row justify-content-center g-0">
                <div class="col-11 col-sm-9 col-md-7 col-lg-5">
                    <div class="p-4 p-md-5 border-0 shadow rounded form-card">

                        <div class="text-center mb-4">
                            <h2 class="h4 fw-bold text-dark">Görüşleriniz Bizim İçin Değerli</h2>
                            <p class="text-muted small">Sivas rehberimiz hakkında soru, öneri veya iş birlikleri için
                                bize yazabilirsiniz.</p>
                        </div>

                        <form id="contactForm" novalidate>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Adınız ve Soyadınız</label>
                                <input type="text" id="nameInput" class="form-control" placeholder="Örn: Aziz Sancar">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">E-posta Adresiniz</label>
                                <input type="email" id="emailInput" class="form-control" placeholder="isim@mail.com">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Mesajınız</label>
                                <textarea id="messageInput" class="form-control" rows="5"
                                    placeholder="Size nasıl yardımcı olabiliriz?"></textarea>
                            </div>
                            <button type="submit" class="btn btn-dark w-100 py-2 shadow-sm">Mesajı Gönder</button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-auto py-4 bg-dark text-white text-center">
        <div class="container">
            <div class="d-flex justify-content-center gap-3 mb-3">
                <a href="./index.html" class="text-white text-decoration-none small opacity-75">Anasayfa</a>
                <a href="./rehber.html" class="text-white text-decoration-none small opacity-75">Rehber</a>
                <a href="./iletisim.html" class="text-white text-decoration-none small opacity-75">İletişim</a>
            </div>
            <p class="mb-1 small fw-bold">© 2026 Sivas Kaşifi - Tüm Hakları Saklıdır.</p>
        </div>
    </footer>

    
    <div class="modal fade" id="alertModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Kapat"></button>
                </div>
                <div class="modal-body text-center pt-0 pb-4 px-4">
                    <h5 class="fw-bold mb-3" id="alertModalTitle">Uyarı</h5>
                    <p class="text-muted mb-4" id="alertModalMessage">Mesaj içeriği</p>
                    <button type="button" class="btn btn-dark w-100 rounded-pill" data-bs-dismiss="modal">Tamam</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
